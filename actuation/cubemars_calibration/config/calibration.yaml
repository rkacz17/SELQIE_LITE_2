cubemars_calibration_node:
  ros__parameters:

    # Motors to calibrate — order determines calibration sequence.
    # Reduce to a subset for faster runs, e.g. ['motor0', 'motor1'].
    joint_names:
      - motor0
      - motor1
      - motor2
      - motor3
      - motor4
      - motor5
      - motor6
      - motor7

    # Must match the motor_type in actuation.launch.py
    motor_type: AK40-10

    # Where to write the calibrated gains YAML
    output_file: /tmp/cubemars_calibrated_gains.yaml

    # Set true to run the node without sending any CAN commands (wiring test)
    dry_run: false
